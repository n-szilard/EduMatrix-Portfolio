<p-toast position="bottom-center"></p-toast>

<div class="profile-page">
  <!-- FŐ TARTALOM -->
  <div class="content">

    <div class="profile-context">
      <div class="profile-context__left">
        <p-tag [value]="contextTitle" severity="info" [rounded]="true" />
        <p-tag [value]="roleLabel" severity="secondary" [rounded]="true" />
      </div>

      <a pButton type="button" [routerLink]="roleHomeRoute" label="Vissza a felületre" icon="pi pi-arrow-left" severity="secondary" [outlined]="true"></a>
    </div>

    <!-- Profil fejléc -->
    <div class="profile-header">
      <div class="avatar-wrap">
        <p-avatar [label]="initials" shape="circle" styleClass="big-avatar" />
       
      </div>
      <div>
  <h1>{{ vezeteknev }} {{ keresztnev }}</h1>
  <p>{{ roleLabel }} • EduMatrix Intézmény</p>
        <div class="flex gap-2 mt-2">
          <p-tag value="AKTÍV FIÓK" severity="success" [rounded]="true" />
        </div>
      </div>
    </div>

    <!-- Formok -->
    <div class="grid">

      <!-- Személyes adatok -->
      <div class="col-12 lg:col-6">
        <div class="card">
          <div class="card-head">
            <i class="pi pi-id-card text-primary"></i>
            <span>Személyes adatok</span>
          </div>
          <div class="card-body">
            <div class="grid">
              <div class="col-6">
                <label>Vezetéknév</label>
                <input pInputText [(ngModel)]="vezeteknev" class="w-full" />
              </div>
              <div class="col-6">
                <label>Keresztnév</label>
                <input pInputText [(ngModel)]="keresztnev" class="w-full" />
              </div>
            </div>
            <div class="mt-3">
              <label>Email cím</label>
              <input pInputText type="email" [(ngModel)]="email" class="w-full" />
            </div>
            <div class="mt-3">
              <label>Username</label>
              <input pInputText type="text" [(ngModel)]="username" class="w-full" />
            </div>

      <div class="flex justify-content-end gap-2 mt-4">
        <p-button label="Mégse" severity="secondary" [outlined]="true" (click)="megse()" />
        <p-button label="Változtatások mentése" icon="pi pi-save" (click)="mentesek()" />
      </div>
          </div>
        </div>
      </div>

      <!-- Jelszó módosítása -->
      <div class="col-12 lg:col-6">
        <div class="card">
          <div class="card-head">
            <i class="pi pi-lock text-primary"></i>
            <span>Jelszó módosítása</span>
          </div>
          <div class="card-body">
            <div>
              <label>Jelenlegi jelszó</label>
              <p-password
                [(ngModel)]="jelenlegiJelszo"
                [feedback]="false"
                [toggleMask]="true"
                styleClass="w-full"
                inputStyleClass="w-full" />
            </div>

            <div class="mt-3">
              <label>Új jelszó</label>
              <p-password
                [(ngModel)]="ujJelszo"
                [toggleMask]="true"
                styleClass="w-full"
                inputStyleClass="w-full" />
              <small class="block mt-1" [class.text-red-400]="passwordTooShort">
                Legalább 8 karakter.
              </small>
            </div>

            <div class="mt-3">
              <label>Új jelszó megerősítése</label>
              <p-password
                [(ngModel)]="ujJelszoMegerosites"
                [feedback]="false"
                [toggleMask]="true"
                styleClass="w-full"
                inputStyleClass="w-full" />
              <small class="block mt-1 text-red-400" *ngIf="passwordMismatch">
                A két jelszó nem egyezik.
              </small>
            </div>

            <div class="flex justify-content-end mt-4">
              <p-button
                label="Jelszó módosítása"
                icon="pi pi-check"
                (click)="jelszoModositas()" />
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>
